<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>

<h2>Admin Panel</h2>
<button onclick="connectWallet()">Connect Wallet</button>

<hr/>

<h3>Create Election</h3>
<input id="eName" placeholder="Election name"/>
<input type="datetime-local" id="start"/>
<input type="datetime-local" id="end"/>
<button onclick="createElection()">Create Election</button>

<hr/>

<h3>Select Election</h3>
<select id="electionSelect"></select>
<button onclick="loadElections()">Load Elections</button>

<hr/>

<h3>Add Candidate</h3>
<input id="candidate" placeholder="Candidate name"/>
<button onclick="addCandidate()">Add Candidate</button>

<hr/>

<h3>Whitelist Voter IDs</h3>
<textarea id="voterIdInput" rows="5" cols="40"
placeholder="Enter Aadhaar IDs (comma or newline separated)"></textarea>
<br/>
<button onclick="whitelistVoterIds()">Whitelist</button>

<hr/>

<h3>Show Candidates</h3>
<button onclick="loadCandidates()">Show Candidates</button>
<ul id="candidateList"></ul>

<pre id="output"></pre>

<script>

let provider, signer, contract;

const contractAddress = "0x0483DA68456E644fdBE922813B47aC0B29a874C3";

const abi = [
  "function createElection(string,uint,uint)",
  "function getElectionCount() view returns(uint)",
  "function getElection(uint) view returns(string,uint,uint)",
  "function addCandidate(uint,string)",
  "function getCandidateCount(uint) view returns(uint)",
  "function getCandidate(uint,uint) view returns(string,uint)",
  "function whitelistMultipleVoterIds(uint,bytes32[])"
];

// ======================
async function connectWallet(){
  try{
    await window.ethereum.request({ method:"eth_requestAccounts" });

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    contract = new ethers.Contract(contractAddress, abi, signer);

    output("✅ Wallet connected");

  }catch(err){
    console.error(err);
    output("❌ Wallet connection failed");
  }
}

// ======================
function requireWallet(){
  if(!contract){
    alert("Connect wallet first");
    return false;
  }
  return true;
}

// ======================
function toTimestamp(val){
  return Math.floor(new Date(val).getTime()/1000);
}

// ======================
async function createElection(){

  if(!requireWallet()) return;

  const name = document.getElementById("eName").value.trim();
  const startVal = document.getElementById("start").value;
  const endVal = document.getElementById("end").value;

  if(!name) return output("❌ Enter election name");
  if(!startVal || !endVal) return output("❌ Select time");

  const start = toTimestamp(startVal);
  const end = toTimestamp(endVal);

  if(start >= end){
    return output("❌ End must be after start");
  }

  try{
    const tx = await contract.createElection(name, start, end);
    await tx.wait();

    output("✅ Election created");
    await loadElections();

  }catch(err){
    console.error(err);
    output("❌ " + (err.reason || err.message));
  }
}

// ======================
async function loadElections(){

  if(!requireWallet()) return;

  try{
    const count = await contract.getElectionCount();

    const select = document.getElementById("electionSelect");
    select.innerHTML = "";

    for(let i=0;i<count;i++){
      const e = await contract.getElection(i);

      const opt = document.createElement("option");
      opt.value = i;
      opt.text = `${i} - ${e[0]}`;
      select.appendChild(opt);
    }

    output("✅ Elections loaded");

  }catch(err){
    console.error(err);
    output("❌ Failed to load elections");
  }
}

// ======================
async function addCandidate(){

  if(!requireWallet()) return;

  const id = document.getElementById("electionSelect").value;
  const name = document.getElementById("candidate").value.trim();

  if(id === "") return output("❌ Select election");
  if(!name) return output("❌ Enter candidate");

  try{
    const tx = await contract.addCandidate(id, name);
    await tx.wait();

    output("✅ Candidate added");

    // 🔥 AUTO REFRESH
    await loadCandidates();

  }catch(err){
    console.error(err);
    output("❌ " + (err.reason || err.message));
  }
}

// ======================
async function loadCandidates(){

  if(!requireWallet()) return;

  const id = document.getElementById("electionSelect").value;

  if(id === "") return output("❌ Select election");

  try{
    const list = document.getElementById("candidateList");
    list.innerHTML = "";

    const count = await contract.getCandidateCount(id);

    for(let i=0;i<count;i++){
      const c = await contract.getCandidate(id, i);

      const li = document.createElement("li");
      li.innerText = `${c[0]} | Votes: ${c[1]}`;
      list.appendChild(li);
    }

    output("✅ Candidates loaded");

  }catch(err){
    console.error(err);
    output("❌ Failed to load candidates");
  }
}

// ======================
async function whitelistVoterIds(){

  if(!requireWallet()) return;

  const input = document.getElementById("voterIdInput").value;
  const id = document.getElementById("electionSelect").value;

  if(id === "") return output("❌ Select election");

  let arr = input.split(/[\n,]+/);
  let hashed = [];

  for(let x of arr){
    let clean = x.trim();
    if(clean){
      hashed.push(
        ethers.keccak256(ethers.toUtf8Bytes(clean))
      );
    }
  }

  try{
    const tx = await contract.whitelistMultipleVoterIds(id, hashed);
    await tx.wait();

    output("✅ Whitelisted");

  }catch(err){
    console.error(err);
    output("❌ " + (err.reason || err.message));
  }
}

// ======================
function output(msg){
  document.getElementById("output").innerText = msg;
}

// ======================
window.onload = () => {
  output("⚡ Connect wallet to start");
};

</script>

</body>
</html>
