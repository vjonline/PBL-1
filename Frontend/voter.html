<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Voter Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>

<h2>Voter Panel</h2>

<button onclick="connectWallet()">Connect Wallet</button>

<hr/>

<h3>Select Election</h3>
<select id="electionSelect"></select>
<button onclick="loadElections()">Load Elections</button>

<hr/>

<h3>Enter Aadhaar</h3>
<input id="voterIdInput" placeholder="Enter Aadhaar"/>
<button onclick="sendOtp()">Send OTP</button>

<hr/>

<h3>Verify OTP</h3>
<input id="otpInput" placeholder="Enter OTP"/>
<button onclick="verifyAndLogin()">Verify & Login</button>

<!-- ✅ TIMER -->
<p id="timer" style="color:red;"></p>

<hr/>

<h3>Candidates</h3>
<button onclick="loadCandidates()">Load Candidates</button>
<ul id="candidateList"></ul>

<pre id="output"></pre>

<script>

const BASE_URL = "http://localhost:3000";

let provider, signer, contract;

let storedEmail = "";
let otpTimer = null;
let timeLeft = 0;

const contractAddress = "0x0483DA68456E644fdBE922813B47aC0B29a874C3";

const abi = [
  "function getElectionCount() view returns(uint)",
  "function getElection(uint) view returns(string,uint,uint)",
  "function getCandidateCount(uint) view returns(uint)",
  "function getCandidate(uint,uint) view returns(string,uint)",
  "function vote(uint,uint)",
  "function register(uint,bytes32)",
  "function isRegistered(uint,address) view returns(bool)",
  "function hasAlreadyVoted(uint,address) view returns(bool)"
];

// ======================
async function connectWallet(){

  if(!window.ethereum){
    return alert("Install MetaMask");
  }

  try{
    await window.ethereum.request({ method:"eth_requestAccounts" });

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    contract = new ethers.Contract(contractAddress, abi, signer);

    output("✅ Wallet connected");

  }catch(err){
    console.error(err);
    output("❌ Wallet connection failed");
  }
}

// ======================
function requireWallet(){
  if(!contract){
    alert("Connect wallet first");
    return false;
  }
  return true;
}

// ======================
async function loadElections(){

  if(!requireWallet()) return;

  try{
    const count = await contract.getElectionCount();
    const select = document.getElementById("electionSelect");

    select.innerHTML = "";

    const now = Math.floor(Date.now() / 1000);

    for(let i=0;i<count;i++){
      const e = await contract.getElection(i);

      const start = Number(e[1]);
      const end = Number(e[2]);

      // 🔥 ONLY SHOW ACTIVE
      if(now >= start && now <= end){
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = `${i} - ${e[0]}`;
        select.appendChild(opt);
      }
    }

    if(select.innerHTML === ""){
      output("⚠️ No active elections");
    } else {
      output("✅ Active elections loaded");
    }

  }catch(err){
    console.error(err);
    output("❌ Failed to load elections");
  }
}

// ======================
async function sendOtp(){

  const aadhaar = document.getElementById("voterIdInput").value.trim();
  const electionId = document.getElementById("electionSelect").value;

  if(aadhaar === "") return output("❌ Enter Aadhaar");
  if(electionId === "") return output("❌ Select election");

  try{
    const res = await fetch(`${BASE_URL}/send-otp`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ aadhaar, electionId })
    });

    const data = await res.json();

    if(!data.success){
      return output("❌ " + data.message);
    }

    storedEmail = data.email;

    output("📩 OTP sent");

    // 🔥 START TIMER
    startTimer(60);

  }catch(err){
    console.error(err);
    output("❌ OTP failed");
  }
}

// ======================
function startTimer(seconds){

  clearInterval(otpTimer);

  timeLeft = seconds;

  const timerEl = document.getElementById("timer");

  otpTimer = setInterval(() => {

    if(timeLeft <= 0){
      clearInterval(otpTimer);
      timerEl.innerText = "❌ OTP expired";
      return;
    }

    timerEl.innerText = `⏳ OTP expires in ${timeLeft}s`;

    timeLeft--;

  }, 1000);
}

// ======================
async function verifyAndLogin(){

  if(!requireWallet()) return;

  const aadhaar = document.getElementById("voterIdInput").value.trim().toLowerCase();
  const otp = document.getElementById("otpInput").value.trim();

  if(!otp) return output("❌ Enter OTP");

  try{
    const wallet = await signer.getAddress();

    const res = await fetch(`${BASE_URL}/verify-otp`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: storedEmail,
        token: otp,
        aadhaar,
        wallet
      })
    });

    const data = await res.json();

    if(!data.success){
      return output("❌ " + data.message);
    }

    // 🔥 STOP TIMER
    clearInterval(otpTimer);
    document.getElementById("timer").innerText = "✅ OTP verified";

    output("✅ Logged in");

  }catch(err){
    console.error(err);
    output("❌ Verification failed");
  }
}

// ======================
async function loadCandidates(){

  if(!requireWallet()) return;

  const id = document.getElementById("electionSelect").value;

  if(id === "") return output("❌ Select election");

  try{
    const list = document.getElementById("candidateList");
    list.innerHTML = "";

    const wallet = await signer.getAddress();
    const voted = await contract.hasAlreadyVoted(id, wallet);

    const count = await contract.getCandidateCount(id);

    for(let i=0;i<count;i++){
      const c = await contract.getCandidate(id, i);

      const li = document.createElement("li");

      li.innerHTML = `
        ${c[0]} | Votes: ${c[1]}
        <button ${voted ? "disabled" : ""} onclick="vote(${id},${i})">
          ${voted ? "Voted" : "Vote"}
        </button>
      `;

      list.appendChild(li);
    }

    if(voted){
      output("⚠️ You have already voted");
    } else {
      output("✅ Candidates loaded");
    }

  }catch(err){
    console.error(err);
    output("❌ Failed to load candidates");
  }
}

// ======================
async function vote(electionId, candidateId){

  try{
    const wallet = await signer.getAddress();

    const aadhaar = document.getElementById("voterIdInput").value.trim().toLowerCase();

    let isReg = await contract.isRegistered(electionId, wallet);

    if(!isReg){
      const hashed = ethers.keccak256(ethers.toUtf8Bytes(aadhaar));
      const tx1 = await contract.register(electionId, hashed);
      await tx1.wait();
    }

    const voted = await contract.hasAlreadyVoted(electionId, wallet);

    if(voted){
      return output("❌ Already voted");
    }

    const tx = await contract.vote(electionId, candidateId);
    await tx.wait();

    output("✅ Vote successful");

    await loadCandidates();

  }catch(err){
    console.error(err);

    if(err.reason){
      return output("❌ " + err.reason);
    }

    output("❌ Transaction failed");
  }
}

// ======================
function output(msg){
  document.getElementById("output").innerText = msg;
}

</script>

</body>
</html>
